name: Deploy UPLINK

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        port: ${{ secrets.VPS_PORT }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /srv/docker/uplink/uplink-website
          set -euo pipefail

          # Prevent git pull failure when an old generated bundle exists as untracked file.
          rm -f public/css/bundle.css

          git pull origin main

          BUNDLE=public/css/bundle.css
          : > "$BUNDLE"

          for f in \
            public/css/00-reset.css \
            public/css/01-layout.css \
            public/css/02-typography.css \
            public/css/03-components/site-chrome.css \
            public/css/03-components/navigation.css \
            public/css/03-components/cold-open.css \
            public/css/03-components/landing.css \
            public/css/03-components/dashboard.css \
            public/css/03-components/timeline.css \
            public/css/03-components/analyst.css \
            public/css/03-components/archive.css \
            public/css/03-components/dossiers.css \
            public/css/03-components/info.css \
            public/css/04-effects.css \
            public/css/05-themes.css \
            public/css/06-responsive.css
          do
            test -f "$f"
            sed '1s/^\xEF\xBB\xBF//' "$f" >> "$BUNDLE"
            printf '\n' >> "$BUNDLE"
          done

          test -f /srv/docker/data/uplink/data/config.json
          test -f /srv/docker/data/uplink/data/dialogs.json
          test -f /srv/docker/data/uplink/data/stats.json

          python3 scripts/build_static_pages.py \
            --config /srv/docker/data/uplink/data/config.json \
            --dialogs /srv/docker/data/uplink/data/dialogs.json \
            --stats /srv/docker/data/uplink/data/stats.json \
            --output-dir public \
            --base-url https://uplink.michaeluhrich.xyz

          rsync -av --delete ./public/ /srv/docker/data/uplink/public/
          rsync -av --delete --exclude='__pycache__' ./scripts/ /srv/docker/data/uplink/scripts/
